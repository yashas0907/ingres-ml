services:
  - type: web
    name: ingres-ml-backend
    runtime: python
    rootDir: Backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: ingres_db
      - key: MONGODB_TIMEOUT_MS
        value: "5000"
      - key: HF_TOKEN
        sync: false
      - key: GEMMA_ENDPOINT_URL
        sync: false
      - key: GEMMA_ENDPOINT_FORMAT
        value: openai
      - key: GEMMA_MODEL
        value: ingres-gemma
      - key: GEMMA_API_KEY
        sync: false
      - key: GEMMA_TIMEOUT_SECONDS
        value: "45"
      - key: CORS_ORIGINS
        value: "*"
